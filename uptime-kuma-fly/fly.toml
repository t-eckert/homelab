app = 'uptime-kuma-te'
primary_region = 'yyz'
kill_signal = 'SIGINT'
kill_timeout = '5s'

[build]
  image = 'louislam/uptime-kuma:2.2.1'

[mounts]
  source = 'uptime_kuma_data'
  destination = '/app/data'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '60s'
    method = 'GET'
    path = '/api/entry-page'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
